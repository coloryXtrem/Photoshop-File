<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Éditeur PSD — Injection Shopmium</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c28;
      --border: #2a2a3a;
      --accent: #ff5c35;
      --accent2: #ffb347;
      --text: #e8e8f0;
      --muted: #666680;
      --success: #3ddc97;
      --font-head: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    body {
      font-family: var(--font-head);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── HEADER ─── */
    header {
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .badge {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      background: var(--accent);
      color: #fff;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.05em;
    }

    /* ─── LAYOUT ─── */
    .layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      flex: 1;
      height: calc(100vh - 57px);
    }

    /* ─── SIDEBAR ─── */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 24px 24px 16px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-title {
      font-size: 0.65rem;
      font-family: var(--font-mono);
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .sidebar-subtitle {
      font-size: 1.1rem;
      font-weight: 700;
      line-height: 1.3;
    }

    .form-body {
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      flex: 1;
    }

    .section-label {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--accent);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 8px;
      margin-bottom: -4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    label {
      font-size: 0.7rem;
      font-family: var(--font-mono);
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.8rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(255, 92, 53, 0.12);
    }

    input::placeholder { color: var(--muted); }

    /* ─── BUTTONS ─── */
    .btn-group {
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border-top: 1px solid var(--border);
    }

    .btn {
      padding: 12px 20px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.02em;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      background: #ff7355;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(255, 92, 53, 0.35);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      border-color: var(--accent2);
      color: var(--accent2);
    }

    .btn-pdf {
      background: var(--success);
      color: #000;
    }

    .btn-pdf:hover {
      background: #5aeaaa;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(61, 220, 151, 0.3);
    }

    /* ─── STATUS ─── */
    .status-bar {
      padding: 10px 24px;
      background: var(--surface2);
      border-top: 1px solid var(--border);
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }

    .status-dot.ready { background: var(--success); }
    .status-dot.loading { background: var(--accent2); animation: pulse 1s infinite; }

    /* ─── EDITOR ─── */
    .editor-area {
      position: relative;
      background: var(--bg);
      display: flex;
      flex-direction: column;
    }

    .editor-toolbar {
      padding: 10px 20px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .toolbar-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .toolbar-sep { width: 1px; height: 14px; background: var(--border); }

    #editor {
      flex: 1;
      border: none;
      width: 100%;
    }

    /* ─── TOAST ─── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 20px;
      font-family: var(--font-mono);
      font-size: 0.78rem;
      display: flex;
      align-items: center;
      gap: 10px;
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 200;
      max-width: 320px;
    }

    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: var(--success); }
    .toast.error { border-color: var(--accent); }

    .toast-icon { font-size: 1.1rem; }

    /* ─── PROGRESS ─── */
    .progress-bar {
      height: 2px;
      background: var(--border);
      position: relative;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      width: 0%;
      transition: width 0.5s ease;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    PSD Injector
  </div>
  <span class="badge">SOLUTION 1 — MANUELLE</span>
</header>

<div class="layout">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Données à injecter</div>
      <div class="sidebar-subtitle">Remplis les champs<br/>puis applique au PSD</div>
    </div>

    <div class="form-body">

      <div class="section-label">Magasin</div>

      <div class="field">
        <label>NOM DU MAGASIN</label>
        <input id="f_market" type="text" value="MARKET AUBIGNY-EN-ARTOIS" placeholder="Ex: MARKET AUBIGNY-EN-ARTOIS"/>
      </div>
      <div class="field">
        <label>TÉLÉPHONE</label>
        <input id="f_tel" type="text" value="Tél: 03 21 48 36 36" placeholder="Tél: XX XX XX XX XX"/>
      </div>
      <div class="field">
        <label>HORAIRES LUN-SAM</label>
        <input id="f_horaires_sem" type="text" value="Lun. au Sam.: 08:30 à 20:00" placeholder="Lun. au Sam.: 08:30 à 20:00"/>
      </div>
      <div class="field">
        <label>HORAIRES DIM</label>
        <input id="f_horaires_dim" type="text" value="Dim.: 08:30 à 12:30" placeholder="Dim.: 08:30 à 12:30"/>
      </div>

      <div class="section-label">Transaction</div>

      <div class="field">
        <label>DATE & HEURE</label>
        <input id="f_date" type="text" value="13/02/2026 à 10h18" placeholder="JJ/MM/AAAA à HHhMM"/>
      </div>
      <div class="field">
        <label>PRODUIT</label>
        <input id="f_produit" type="text" value="TOUCHER MAGIQUE 4D ULTRA CONFORT 6 RLX XL" placeholder="Nom du produit"/>
      </div>
      <div class="field">
        <label>QTÉ x P.U. (ex: 5 x 3.99)</label>
        <input id="f_qte" type="text" value="5 x 3.99" placeholder="5 x 3.99"/>
      </div>
      <div class="field">
        <label>MONTANT LIGNE (€)</label>
        <input id="f_montant" type="text" value="19.95" placeholder="19.95"/>
      </div>

      <div class="section-label">Totaux</div>

      <div class="field">
        <label>TOTAL À PAYER</label>
        <input id="f_total" type="text" value="19.95€" placeholder="19.95€"/>
      </div>
      <div class="field">
        <label>MODE PAIEMENT</label>
        <input id="f_paiement" type="text" value="Carte bancaire" placeholder="Carte bancaire / Espèces"/>
      </div>
      <div class="field">
        <label>MONTANT PAYÉ</label>
        <input id="f_montant_paye" type="text" value="19.95€" placeholder="19.95€"/>
      </div>
      <div class="field">
        <label>CARTE FIDÉLITÉ</label>
        <input id="f_carte" type="text" value="Ma carte Club Carrefour" placeholder="Ma carte Club Carrefour"/>
      </div>
      <div class="field">
        <label>N° CARTE</label>
        <input id="f_num_carte" type="text" value="913572000053662" placeholder="Numéro de carte"/>
      </div>

      <div class="section-label">TVA</div>

      <div class="field">
        <label>TAUX TVA (%)</label>
        <input id="f_taux_tva" type="text" value="10.0%" placeholder="10.0%"/>
      </div>
      <div class="field">
        <label>TOTAL PRODUITS (HT)</label>
        <input id="f_total_produits" type="text" value="19.95€" placeholder="19.95€"/>
      </div>
      <div class="field">
        <label>DONT TVA</label>
        <input id="f_dont_tva" type="text" value="1.99€" placeholder="1.99€"/>
      </div>
      <div class="field">
        <label>TOTAL TVA</label>
        <input id="f_total_tva" type="text" value="19.95€" placeholder="19.95€"/>
      </div>
      <div class="field">
        <label>MONTANT TVA</label>
        <input id="f_montant_tva" type="text" value="1.99€" placeholder="1.99€"/>
      </div>
      <div class="field">
        <label>CODE TICKET (bas de page)</label>
        <input id="f_code" type="text" value="13.02.26 10:18 9318 1 7938 0452" placeholder="JJ.MM.AA HH:MM XXXX…"/>
      </div>

    </div>

    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

    <div class="btn-group">
      <button class="btn btn-primary" onclick="injectData()">
        ⚡ Appliquer au PSD
      </button>
      <button class="btn btn-pdf" onclick="exportPDF()">
        📄 Exporter en PDF
      </button>
      <button class="btn btn-secondary" onclick="resetFields()">
        ↺ Réinitialiser
      </button>
    </div>

    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">En attente du chargement...</span>
    </div>
  </aside>

  <!-- ── EDITOR ── -->
  <div class="editor-area">
    <div class="editor-toolbar">
      <div class="toolbar-item">🗂 BillReceipt-20250228-1-7326-1735.psd</div>
      <div class="toolbar-sep"></div>
      <div class="toolbar-item">Photopea Editor</div>
      <div class="toolbar-sep"></div>
      <div class="toolbar-item" id="toolbarStatus">Chargement...</div>
    </div>
    <iframe id="editor" src="https://www.photopea.com"></iframe>
  </div>

</div>

<!-- Toast notification -->
<div class="toast" id="toast">
  <span class="toast-icon" id="toastIcon">✓</span>
  <span id="toastMsg">Message</span>
</div>

<script>
  const PSD_URL = "https://raw.githubusercontent.com/coloryXtrem/Photoshop-File/main/BillReceipt-20250228-1-7326-1735.psd";
  const iframe = document.getElementById("editor");
  let psdLoaded = false;

  /* ── Chargement du PSD ── */
  iframe.onload = function () {
    setStatus("loading", "Chargement du PSD...");
    iframe.contentWindow.postMessage({ files: [PSD_URL] }, "*");

    setTimeout(() => {
      psdLoaded = true;
      setStatus("ready", "PSD chargé — prêt à éditer");
      document.getElementById("toolbarStatus").textContent = "✓ Prêt";
    }, 5000);
  };

  /* ── Écoute des messages Photopea ── */
  window.addEventListener("message", function (e) {
    if (typeof e.data === "string" && e.data.includes("done")) {
      showToast("✓", "Données injectées avec succès !", "success");
    }
  });

  /* ── Injection des données ── */
  function injectData() {
    if (!psdLoaded) {
      showToast("⏳", "Attends que le PSD soit chargé...", "error");
      return;
    }

    const d = {
      market:        document.getElementById("f_market").value,
      tel:           document.getElementById("f_tel").value,
      horaires_sem:  document.getElementById("f_horaires_sem").value,
      horaires_dim:  document.getElementById("f_horaires_dim").value,
      date:          document.getElementById("f_date").value,
      produit:       document.getElementById("f_produit").value,
      qte:           document.getElementById("f_qte").value,
      montant:       document.getElementById("f_montant").value,
      total:         document.getElementById("f_total").value,
      paiement:      document.getElementById("f_paiement").value,
      montant_paye:  document.getElementById("f_montant_paye").value,
      carte:         document.getElementById("f_carte").value,
      num_carte:     document.getElementById("f_num_carte").value,
      taux_tva:      document.getElementById("f_taux_tva").value,
      total_produits:document.getElementById("f_total_produits").value,
      dont_tva:      document.getElementById("f_dont_tva").value,
      total_tva:     document.getElementById("f_total_tva").value,
      montant_tva:   document.getElementById("f_montant_tva").value,
      code:          document.getElementById("f_code").value,
    };

    // Correspondance champs → noms exacts des calques Photopea
    const mappings = [
      ["MARKET AUBIGNY",  d.market],
      ["Tél:",            d.tel],
      ["Lun. au Sam.: 08:3", d.horaires_sem],
      ["Dim.: 08:30 à 12:3", d.horaires_dim],
      ["13/02/2026 à 10h",   d.date],
      ["TOUCHER MAGI",    d.produit],
      ["5 x 3.99",        d.qte],
      ["19.95",           d.montant],
      ["19.95€",          d.total],
      ["Carte bancaire",  d.paiement],
      ["19.95€",          d.montant_paye],
      ["Ma carte Club Car", d.carte],
      ["913572000053662", d.num_carte],
      ["10.0%",           d.taux_tva],
      ["Total produits",  d.total_produits],
      ["dont TVA",        d.dont_tva],
      ["Total TVA",       d.total_tva],
      ["1.99€",           d.montant_tva],
      ["13.02.26 10:18 93", d.code],
    ];

    // Construire le script Photopea
    let lines = mappings.map(([name, val]) =>
      `setText(${JSON.stringify(name)}, ${JSON.stringify(val)});`
    ).join("\n");

    const script = `
      (function() {
        function setText(layerName, value) {
          try {
            var doc = app.activeDocument;
            for (var i = 0; i < doc.layers.length; i++) {
              var l = doc.layers[i];
              if (l.name.indexOf(layerName) === 0 && l.kind === LayerKind.TEXT) {
                l.textItem.contents = value;
              }
            }
          } catch(e) {}
        }
        ${lines}
        "done";
      })();
    `;

    setStatus("loading", "Injection en cours...");
    animateProgress();
    iframe.contentWindow.postMessage(script, "*");

    setTimeout(() => {
      setStatus("ready", "Données appliquées ✓");
      showToast("⚡", "Données injectées dans le PSD !", "success");
    }, 1500);
  }

  /* ── Export PDF ── */
  function exportPDF() {
    if (!psdLoaded) {
      showToast("⏳", "PSD pas encore chargé...", "error");
      return;
    }
    const script = `app.activeDocument.saveToOE("pdf");`;
    iframe.contentWindow.postMessage(script, "*");
    showToast("📄", "Export PDF lancé...", "success");
  }

  /* ── Reset ── */
  function resetFields() {
    document.querySelectorAll("input").forEach(i => i.value = "");
    showToast("↺", "Champs réinitialisés", "");
  }

  /* ── UI helpers ── */
  function setStatus(state, msg) {
    const dot = document.getElementById("statusDot");
    dot.className = "status-dot " + state;
    document.getElementById("statusText").textContent = msg;
  }

  function animateProgress() {
    const fill = document.getElementById("progressFill");
    fill.style.width = "0%";
    setTimeout(() => fill.style.width = "100%", 50);
    setTimeout(() => fill.style.width = "0%", 1600);
  }

  function showToast(icon, msg, type) {
    const t = document.getElementById("toast");
    document.getElementById("toastIcon").textContent = icon;
    document.getElementById("toastMsg").textContent = msg;
    t.className = "toast " + type + " show";
    setTimeout(() => t.className = "toast " + type, 3500);
  }
</script>

</body>
</html>
